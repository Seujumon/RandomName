<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista Aleatoria</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #2b2b2b;
        color: #dcdcdc;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
    }

    h1 {
        margin-bottom: 10px;
    }

    .container {
        width: 100%;
        max-width: 500px;
    }

    .items {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
    }

    button {
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background-color: #444;
        color: #ddd;
        transition: 0.2s;
    }

    button:hover {
        background-color: #666;
    }

    button.active {
        background-color: #888;
        color: #fff;
    }

    .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
    }

    .result {
        background-color: #1f1f1f;
        padding: 15px;
        border-radius: 10px;
        min-height: 50px;
    }

    @media (min-width: 600px) {
        .actions {
            flex-direction: row;
            flex-wrap: wrap;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Lista Aleatoria</h1>

    <div class="items" id="itemsContainer"></div>

    <div class="actions">
        <button onclick="generarLista()">Generar lista random</button>
        <button onclick="seleccionarTodos()">Agregar todos</button>
        <button onclick="limpiarSeleccion()">No agregar ninguno</button>
    </div>

    <div class="result" id="resultado"></div>
</div>

<script>
    const objetos = ["Agustín", "Alejandro", "Alicia", "Beatriz", "Carlos", "Esteban", "Franco", "Juan" , "María", "Majo",
                    "Miguel", "Nancy", "Nicolás", "Sergio", "Susana"];

    let seleccionados = new Set();

    const container = document.getElementById("itemsContainer");
    const resultado = document.getElementById("resultado");

    // Crear botones de objetos
    objetos.forEach(obj => {
        const btn = document.createElement("button");
        btn.textContent = obj;

        btn.onclick = () => {
            if (seleccionados.has(obj)) {
                seleccionados.delete(obj);
                btn.classList.remove("active");
            } else {
                seleccionados.add(obj);
                btn.classList.add("active");
            }
        };

        container.appendChild(btn);
    });

    function mezclar(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function generarLista() {
        const lista = Array.from(seleccionados);
        const random = mezclar(lista);

        resultado.innerHTML = random.length
            ? random.join(", ")
            : "No hay elementos seleccionados";
    }

    function seleccionarTodos() {
        seleccionados = new Set(objetos);

        document.querySelectorAll(".items button").forEach(btn => {
            btn.classList.add("active");
        });
    }

    function limpiarSeleccion() {
        seleccionados.clear();

        document.querySelectorAll(".items button").forEach(btn => {
            btn.classList.remove("active");
        });

        resultado.innerHTML = "";
    }
</script>

</body>
</html>
